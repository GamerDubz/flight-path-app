<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Flight Logger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#c6c6c7",
                        "primary-fixed": "#d8e2ff",
                        "inverse-surface": "#2f3132",
                        "on-tertiary-container": "#fcfcfc",
                        "surface": "#f9f9fb",
                        "tertiary-fixed": "#e2e2e2",
                        "secondary-fixed": "#dce1ff",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#d9dadc",
                        "inverse-on-surface": "#f0f0f2",
                        "on-tertiary-fixed-variant": "#454747",
                        "surface-container-highest": "#e2e2e4",
                        "primary": "#0058bc",
                        "surface-container-low": "#f3f3f5",
                        "tertiary": "#5a5c5c",
                        "surface-bright": "#f9f9fb",
                        "error-container": "#ffdad6",
                        "background": "#f9f9fb",
                        "primary-fixed-dim": "#adc6ff",
                        "on-primary-container": "#fefcff",
                        "inverse-primary": "#adc6ff",
                        "on-secondary-container": "#5b617d",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "outline": "#717786",
                        "tertiary-container": "#737575",
                        "secondary-fixed-dim": "#bfc5e4",
                        "on-primary-fixed": "#001a41",
                        "on-surface": "#1a1c1d",
                        "on-surface-variant": "#414755",
                        "primary-container": "#0070eb",
                        "surface-tint": "#005bc1",
                        "surface-container-high": "#e8e8ea",
                        "on-background": "#1a1c1d",
                        "secondary": "#575d78",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#3f465f",
                        "outline-variant": "#c1c6d7",
                        "on-tertiary-fixed": "#1a1c1c",
                        "secondary-container": "#d8defe",
                        "surface-variant": "#e2e2e4",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#141a32",
                        "surface-container": "#eeeef0",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#004493"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-margin": "32px",
                        "gutter": "12px",
                        "container-padding": "20px",
                        "card-gap": "16px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "metric-display": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-bold": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "metric-display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800" }],
                        "body-lg": ["17px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-bold": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen relative overflow-x-hidden antialiased bg-gradient-to-b from-surface-lowest to-surface-container-high">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-slate-900/70 backdrop-blur-[25px] border-b border-white/50 dark:border-slate-700/50 shadow-none flex justify-between items-center px-5 h-16 w-full">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">close</span>
</button>
<h1 class="font-headline-lg text-headline-lg tracking-tight text-on-surface">Log Flight</h1>
<div class="w-10 h-10"></div> <!-- Placeholder for balance -->
</header>
<!-- Main Content Canvas -->
<main class="pt-[100px] pb-[120px] px-container-padding max-w-md mx-auto min-h-screen flex flex-col justify-center">
<!-- Wallet Pass Glass Card -->
<div class="relative bg-white/70 backdrop-blur-[25px] rounded-[24px] border border-white/50 shadow-[0_8px_32px_rgba(0,0,0,0.04)] overflow-hidden flex flex-col">
<!-- Top Section: Search / Flight Number -->
<div class="p-container-padding border-b border-outline-variant/30 bg-surface-container-lowest/50">
<div class="relative flex items-center bg-white/50 rounded-full border border-white/80 focus-within:border-primary transition-colors h-12 px-4 shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)]">
<span class="material-symbols-outlined text-outline mr-3">search</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-lg text-body-lg text-on-surface placeholder:text-outline/70 p-0" placeholder="Flight Number (e.g., BA117)" type="text"/>
<button class="w-6 h-6 rounded-full bg-surface-variant flex items-center justify-center opacity-0 focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">close</span>
</button>
</div>
</div>
<!-- Middle Section: Routing (Origin / Destination) -->
<div class="p-container-padding flex justify-between items-center relative">
<!-- Origin -->
<div class="flex flex-col items-start w-1/3 z-10">
<label class="font-label-bold text-label-bold text-outline uppercase tracking-widest mb-1">From</label>
<input class="bg-transparent border-b border-dashed border-outline-variant/50 focus:border-primary focus:ring-0 font-metric-display text-metric-display text-on-surface w-full p-0 text-left transition-colors" type="text" value="LHR"/>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-1 line-clamp-1 w-full text-left">London</span>
</div>
<!-- Flight Path graphic -->
<div class="flex-1 flex flex-col items-center justify-center relative px-2 z-0">
<div class="w-full h-[1px] border-t border-dashed border-primary absolute top-1/2 left-0 -translate-y-1/2"></div>
<div class="w-8 h-8 rounded-full bg-white border border-primary/20 flex items-center justify-center relative z-10 shadow-[0_2px_8px_rgba(0,112,235,0.15)]">
<span class="material-symbols-outlined text-primary transform rotate-90 text-[20px]">flight</span>
</div>
</div>
<!-- Destination -->
<div class="flex flex-col items-end w-1/3 z-10">
<label class="font-label-bold text-label-bold text-outline uppercase tracking-widest mb-1">To</label>
<input class="bg-transparent border-b border-dashed border-outline-variant/50 focus:border-primary focus:ring-0 font-metric-display text-metric-display text-on-surface w-full p-0 text-right placeholder:text-outline-variant transition-colors" placeholder="JFK" type="text"/>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-1 line-clamp-1 w-full text-right">New York</span>
</div>
</div>
<div class="px-container-padding pb-container-padding pt-0">
<div class="w-full h-[1px] bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>
</div>
<!-- Bottom Section: Details Grid -->
<div class="p-container-padding pt-0 grid grid-cols-3 gap-card-gap relative">
<div class="flex flex-col relative group">
<label class="font-label-bold text-label-bold text-outline uppercase tracking-widest mb-2 flex items-center">
<span class="material-symbols-outlined text-[14px] mr-1">calendar_today</span> Date
                    </label>
<input class="bg-surface-container-lowest/50 border border-white/60 focus:border-primary rounded-lg font-body-sm text-body-sm text-on-surface p-2 w-full transition-colors shadow-[inset_0_1px_2px_rgba(0,0,0,0.02)]" type="date"/>
</div>
<div class="flex flex-col relative group">
<label class="font-label-bold text-label-bold text-outline uppercase tracking-widest mb-2 flex items-center">
<span class="material-symbols-outlined text-[14px] mr-1">airline_seat_recline_extra</span> Class
                    </label>
<select class="bg-surface-container-lowest/50 border border-white/60 focus:border-primary rounded-lg font-body-sm text-body-sm text-on-surface p-2 w-full transition-colors shadow-[inset_0_1px_2px_rgba(0,0,0,0.02)] appearance-none">
<option>Economy</option>
<option>Premium</option>
<option>Business</option>
<option>First</option>
</select>
<span class="material-symbols-outlined absolute right-2 bottom-2 text-outline pointer-events-none text-[18px]">expand_more</span>
</div>
<div class="flex flex-col relative group">
<label class="font-label-bold text-label-bold text-outline uppercase tracking-widest mb-2 flex items-center">
<span class="material-symbols-outlined text-[14px] mr-1">chair</span> Seat
                    </label>
<input class="bg-surface-container-lowest/50 border border-white/60 focus:border-primary rounded-lg font-body-sm text-body-sm text-on-surface p-2 w-full transition-colors shadow-[inset_0_1px_2px_rgba(0,0,0,0.02)] placeholder:text-outline/50 uppercase" placeholder="e.g. 12A" type="text"/>
</div>
</div>
<!-- "Slide to Takeoff" Action -->
<div class="p-container-padding bg-surface-container-highest/20 mt-2">
<div class="relative h-[56px] bg-primary-container rounded-full overflow-hidden flex items-center shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)] group cursor-pointer border border-primary/20">
<div class="absolute inset-0 flex items-center justify-center font-headline-md text-headline-md text-on-primary-container z-0 opacity-80 pointer-events-none tracking-wide">
                        Slide to Log
                    </div>
<!-- Slider Handle (Static representation) -->
<div class="h-[48px] w-[48px] bg-white rounded-full ml-1 flex items-center justify-center shadow-[0_2px_8px_rgba(0,0,0,0.15)] z-10 border border-white/50 relative transform transition-transform group-hover:translate-x-2">
<span class="material-symbols-outlined text-primary-container transform rotate-90 filled text-[24px]">flight</span>
</div>
<!-- Shimmer effect overlay -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full z-20 pointer-events-none"></div>
</div>
</div>
<!-- Decorative edge cuts for wallet pass look -->
<div class="absolute top-1/2 -left-3 w-6 h-6 bg-background rounded-full border-r border-white/50 shadow-[inset_2px_0_4px_rgba(0,0,0,0.02)]"></div>
<div class="absolute top-1/2 -right-3 w-6 h-6 bg-background rounded-full border-l border-white/50 shadow-[inset_-2px_0_4px_rgba(0,0,0,0.02)]"></div>
</div>
</main>
<!-- Suppressed Bottom Navigation (as per rules for transactional input screen) -->
<!-- Navigation shell excluded -->
</body></html>
